# nixpacks.toml  — place in the repo root (next to server.js / package.json), then redeploy.
#
# We use the FULL `puppeteer` npm package, which downloads its own known-good Chromium
# during the build. We only need to (a) install the shared libraries that Chromium
# links against, and (b) install fonts so Latin AND Arabic text render (no empty boxes).
#
# PUPPETEER_CACHE_DIR is pinned inside the app dir so the Chromium downloaded at build
# time is in the same image the app runs from (avoids a $HOME mismatch at runtime).

[variables]
PUPPETEER_CACHE_DIR = "/app/.cache/puppeteer"

[phases.setup]
aptPkgs = [
  "ca-certificates",
  "fonts-liberation",
  "fonts-noto-core",
  "fonts-dejavu-core",
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libdbus-1-3",
  "libxkbcommon0",
  "libatspi2.0-0",
  "libx11-6",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libxcb1",
  "libxshmfence1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2",
  "libgtk-3-0"
]
