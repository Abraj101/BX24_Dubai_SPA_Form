<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Times New Roman', Times, serif; font-size: 12px; color: #000; background: #e9edec; }

    /* Action bar */
    .action-bar {
        position: sticky; top: 0; z-index: 50; background: #fff;
        border-bottom: 1px solid #e2e8f0; padding: 10px 16px;
        display: flex; align-items: center; justify-content: space-between;
        box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        font-family: Arial, sans-serif;
    }
    .action-bar .status { font-size: 12px; color: #6b7785; }
    .btn-attach {
        background: #2fa36b; color: #fff; border: none; border-radius: 4px;
        padding: 10px 22px; font-size: 13px; font-weight: 700; cursor: pointer; transition: background .15s;
    }
    .btn-attach:hover { background: #268a5a; }
    .btn-attach:disabled { background: #a7cfbb; cursor: not-allowed; }

    /* Document Sheet (A4 Proportions for Web View) */
    .sheet-wrap { padding: 20px; display: flex; justify-content: center; }
    #formRoot {
        background: #fff; width: 210mm; max-width: 100%;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        padding: 20mm; /* Standard A4 margins */
        line-height: 1.5;
    }

    /* Typography & Document Styles */
    h1, h2, h3, h4 { text-align: center; margin-bottom: 15px; font-weight: bold; }
    h1 { font-size: 24px; color: #3d5a4f; margin-top: 20px; }
    h2 { font-size: 18px; text-decoration: underline; }
    p { margin-bottom: 10px; text-align: justify; }
    
    .cover-image { width: 100%; display: block; margin-bottom: 40mm; }
    
    /* Document Tables (Matching the Word Doc style) */
    table.doc-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 11px; }
    table.doc-table th, table.doc-table td { border: 1px solid #000; padding: 6px 8px; vertical-align: top; }
    table.doc-table th { background-color: #f2f2f2; font-weight: bold; text-align: center; }
    
    /* Bilingual Columns */
    .col-en { text-align: left; width: 35%; }
    .col-data { text-align: center; width: 30%; font-weight: bold; }
    .col-ar { text-align: right; width: 35%; direction: rtl; font-family: Arial, sans-serif; }

    /* T&C Bilingual Grid */
    .bilingual-row { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 15px; }
    .bilingual-row .en-text { width: 48%; text-align: justify; }
    .bilingual-row .ar-text { width: 48%; text-align: justify; direction: rtl; font-family: Arial, sans-serif; }

    /* Utilities */
    .page-break { page-break-before: always; }
    .avoid-break { page-break-inside: avoid; }
    .center { text-align: center; }
    .bold { font-weight: bold; }
    .upper { text-transform: uppercase; }
    
    /* Signatures */
    .signature-grid { display: flex; justify-content: space-between; margin-top: 50px; }
    .sig-box { width: 45%; }
    .sig-line { border-top: 1px solid #000; margin-top: 40px; text-align: center; padding-top: 5px; font-weight: bold; }

    /* Schedule A Table Override */
    table.schedule-table th { font-size: 10px; }
    table.schedule-table td { text-align: center; }
</style>

/* ════════════════ INSTALLMENT SCHEDULES ════════════════ */

    '60_40': [

/* ════════════════ HELPERS ════════════════ */
let currentDealId = null;
function callBX(method, params) { return new Promise((resolve, reject) => { BX24.callMethod(method, params, res => { if (res.error()) reject(res.error()); else resolve(res.data()); }); }); }
function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function val(v) { return (v === undefined || v === null || v === '') ? '—' : v; }
function getUF(obj, code) { let v = obj[code]; if (Array.isArray(v)) v = v[0]; if (v && typeof v === 'object') v = (v.value !== undefined ? v.value : v.VALUE); return (v === undefined || v === null) ? '' : v; }
function getProp(product, id) { if (!product) return ''; const keys = ['property' + id, 'property_' + id, 'PROPERTY_' + id, String(id)]; for (let key of keys) { let v = product[key]; if (v == null) continue; if (Array.isArray(v)) v = v[0]; if (typeof v === 'object') return v.valueEnum || v.value || v.VALUE; return v; } return ''; }
function money(n) { return Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

function numberToWords(num) {
    if (num === 0) return "Zero";
    const a = ['','One ','Two ','Three ','Four ', 'Five ','Six ','Seven ','Eight ','Nine ','Ten ','Eleven ','Twelve ','Thirteen ','Fourteen ','Fifteen ','Sixteen ','Seventeen ','Eighteen ','Nineteen '];
    const b = ['', '', 'Twenty','Thirty','Forty','Fifty', 'Sixty','Seventy','Eighty','Ninety'];
    if ((num = num.toString()).length > 9) return 'overflow';
    let n = ('000000000' + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
    if (!n) return; let str = '';
    str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + ' ' + a[n[1][1]]) + 'Crore ' : '';
    str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + ' ' + a[n[2][1]]) + 'Lakh ' : '';
    str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + ' ' + a[n[3][1]]) + 'Thousand ' : '';
    str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + ' ' + a[n[4][1]]) + 'Hundred ' : '';
    str += (n[5] != 0) ? ((str != '') ? 'and ' : '') + (a[Number(n[5])] || b[n[5][0]] + ' ' + a[n[5][1]]) : '';
    return str.trim() + ' Dirhams Only';
}

/* ════════════════ LOAD & RENDER ════════════════ */
function setStatus(msg, err) {
    const el = document.getElementById('status'); el.textContent = msg; el.style.color = err ? '#c62828' : '#6b7785';
}

BX24.init(() => {
    const info = BX24.placement.info();
    currentDealId = info && info.options ? info.options.ID : null;
    if (!currentDealId) { setStatus('Open this from inside a Deal.', true); return; }
    loadAll().catch(e => { console.error(e); setStatus('Could not load deal data.', true); });
});

async function loadAll() {
    setStatus('Loading deal…');
    const dealRes = await callBX('crm.deal.get', { id: currentDealId }); const deal = dealRes.result || dealRes;
    const contactsRes = await callBX('crm.deal.contact.items.get', { id: currentDealId });
    let buyer = {};
    if (contactsRes && contactsRes.length > 0) {
        const cRes = await callBX('crm.contact.get', { id: contactsRes[0].CONTACT_ID }); buyer = cRes.result || cRes;
    }
    const rowsData = await callBX('crm.deal.productrows.get', { id: currentDealId });
    let product = null; let unitNo = '';
    if (rowsData && rowsData.length > 0) {
        unitNo = rowsData[0].PRODUCT_NAME || '';
        const pd = await callBX('catalog.product.get', { id: rowsData[0].PRODUCT_ID }); product = pd.product || pd;
    }

    const netPayable = parseFloat(deal.OPPORTUNITY || 0);

    const data = {
        dateStr: new Date().toLocaleDateString('en-GB'),
        buyerName: [buyer.NAME, buyer.LAST_NAME].filter(Boolean).join(' '),
        address: getUF(buyer, C_ADDRESS), pobox: getUF(buyer, C_POBOX), city: getUF(buyer, C_CITY),
        phone: getUF(buyer, C_PHONE) || (buyer.PHONE && buyer.PHONE[0] ? buyer.PHONE[0].VALUE : ''),
        email: buyer.EMAIL && buyer.EMAIL[0] ? buyer.EMAIL[0].VALUE : '',
        country: getUF(buyer, C_COUNTRY), nationality: getUF(buyer, C_NATIONALITY),
        passport: getUF(buyer, C_PASSPORT), expDate: getUF(buyer, C_EXP_DATE),
        nomineeName: getUF(buyer, C_NOM_NAME), nomineeNat: getUF(buyer, C_NOM_NAT),
        nomineePass: getUF(buyer, C_NOM_PASS), nomineeExp: getUF(buyer, C_NOM_EXP),
        unitNo: unitNo, parkingNo: getUF(deal, F_PARKING_NO),
        area: getProp(product, PROD_AREA), unitType: getProp(product, PROD_TYPE),
        netPayable: netPayable, paymentMode: getUF(deal, F_PAYMENT_MODE), bank: getUF(deal, F_BANK),
        completionDate: getUF(deal, F_COMPLETION_DATE), witnessName: getUF(deal, F_WITNESS_NAME)
    };

    renderForm(data);
    document.getElementById('attachBtn').disabled = false;
    setStatus('Ready — review, then Attach SPA to Deal.');
}

/* ════════════════ ATTACH TO DEAL ════════════════ */
async function attachToDeal() {
    const btn = document.getElementById('attachBtn');
    btn.disabled = true; btn.textContent = 'Generating PDF…';
    setStatus('Generating PDF…');

    try {
        const el = document.getElementById('formRoot');
        const opt = {
            margin: [0, 0, 0, 0], // Margins handled by CSS padding inside formRoot
            filename: 'Dubai_SPA_Form_' + currentDealId + '.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: ['css', 'legacy'] }
        };

        const dataUri = await html2pdf().set(opt).from(el).outputPdf('datauristring');
        const base64 = dataUri.split(',')[1];

        btn.textContent = 'Attaching…';
        setStatus('Uploading to the deal…');

        const fields = {};
        fields[SPA_FILE_FIELD] = { fileData: [opt.filename, base64] };
        await callBX('crm.deal.update', { id: currentDealId, fields: fields });

        setStatus('✓ Attached SPA to the Deal.');
        btn.textContent = 'Attached ✓';
        setTimeout(() => { btn.disabled = false; btn.textContent = 'Attach SPA to Deal'; }, 2500);
    } catch (e) {
        console.error('[SPA Form] attach error:', e);
        setStatus('Attach failed (see console).', true);
        btn.disabled = false; btn.textContent = 'Attach SPA to Deal';
    }
}
